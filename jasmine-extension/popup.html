<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #030712;
      color: #f3f4f6;
      margin: 0;
      text-align: center;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #f59e0b; /* amber-500 */
      border-bottom: 1px solid #1f2937;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }
    .info {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .count-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .count-number {
      font-size: 48px;
      font-weight: bold;
      color: #10b981;
      line-height: 1;
      margin-bottom: 5px;
    }
    .count-label {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #f59e0b, #ea580c);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    button.danger {
      background: #ef4444;
    }
    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    button:disabled {
      background: #374151;
      color: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }
    #status {
      font-size: 13px;
      color: #10b981;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h2>Jasmine Avcı 🎯</h2>
  
  <p class="info">Sahibinden sayfalarında gezinirken sağ alttaki <b>"Avcıya Ekle"</b> butonuna basarak ilanları hafızaya kaydedin. Engellenme riski sıfırdır!</p>

  <div class="count-box">
    <div class="count-number" id="listingCount">0</div>
    <div class="count-label">Kaydedilen İlan</div>
  </div>

  <button id="downloadBtn" disabled>💾 JSON Olarak İndir</button>
  <button id="clearBtn" class="danger" disabled>🗑️ Hafızayı Temizle</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
